# Netlify configuration for the PPAF site (static — no build step)
[build]
  publish = "."

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Always serve the freshest report data
[[headers]]
  for = "/reports/index.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
